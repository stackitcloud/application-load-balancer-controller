---
# Static Secret holding the cloud configuration and the STACKIT service-account
# key used by the controller to authenticate against the STACKIT APIs.
#
# Replace the placeholders below before applying:
#   - projectId   : the STACKIT project the ALBs are provisioned in.
#   - region      : the STACKIT region (e.g. eu01).
#   - networkId   : the network the ALBs are attached to.
#   - sa-key.json : a service-account key JSON downloaded from the STACKIT
#                   portal. The key must have permissions to manage
#                   Application Load Balancers and Certificates in the project.
#
# Optional: override the API endpoints via the `apiEndpoints` block if you
# need to talk to non-default endpoints (e.g. for staging).
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: application-load-balancer-controller-config
  namespace: stackit-alb-system
  labels:
    app.kubernetes.io/name: application-load-balancer-controller
    app.kubernetes.io/part-of: stackit-alb
stringData:
  cloud-config.yaml: |
    global:
      projectId: REPLACE_WITH_PROJECT_ID
      region: REPLACE_WITH_REGION
      # apiEndpoints:
      #   applicationLoadBalancerApi: https://alb.api.eu01.stackit.cloud
      #   applicationLoadBalancerCertificateApi: https://certificates.api.eu01.stackit.cloud
    applicationLoadBalancer:
      networkId: REPLACE_WITH_NETWORK_ID
  sa-key.json: |
    REPLACE_WITH_STACKIT_SERVICE_ACCOUNT_KEY_JSON
